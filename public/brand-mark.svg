<svg xmlns="http://www.w3.org/2000/svg" viewBox="330 190 596 596" width="596" height="596" fill="none">
  <defs>
    <linearGradient id="ringBody" x1="0" y1="230" x2="0" y2="716" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#B81111"/>
      <stop offset="0.30" stop-color="#9E0909"/>
      <stop offset="0.65" stop-color="#680303"/>
      <stop offset="1"    stop-color="#480101"/>
    </linearGradient>
    <linearGradient id="rimLight" x1="0" y1="280" x2="0" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#FFB4AC"/>
      <stop offset="0.28" stop-color="#FF5A48" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#FF2A1E" stop-opacity="0"/>
      <stop offset="1"    stop-color="#FF2A1E" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="footBody" x1="0" y1="638" x2="0" y2="716" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#5E0202"/>
      <stop offset="0.6"  stop-color="#7A0404"/>
      <stop offset="0.9"  stop-color="#A80B08"/>
      <stop offset="1"    stop-color="#D01712"/>
    </linearGradient>
    <linearGradient id="gem" x1="0" y1="315" x2="0" y2="655" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#D01914"/>
      <stop offset="0.35" stop-color="#A80B08"/>
      <stop offset="0.7"  stop-color="#8E0606"/>
      <stop offset="1"    stop-color="#C81210"/>
    </linearGradient>
    <filter id="b3"  x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="b6"  x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="b14" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="14"/></filter>
    <filter id="b26" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="26"/></filter>

    <path id="annulus" fill-rule="evenodd" d="
      M 626.5 242  A 240 228 0 1 1 626.4 242 Z
      M 626.5 287  A 177 183 0 1 0 626.6 287 Z"/>
    <clipPath id="ringClip"><use href="#annulus"/></clipPath>
    <mask id="ringMask">
      <rect x="300" y="160" width="660" height="660" fill="#fff"/>
      <polygon points="558,634 695,634 707,722 546,722" fill="#000"/>
    </mask>

    <!-- left foot: swept serif, pointed tip left, hot underside -->
    <path id="footL" d="
      M 359 650
      Q 436 640 505 648
      L 568 664
      L 587 713
      L 389 715
      Z"/>
  </defs>

  <!-- ambient glow -->
  <ellipse cx="626" cy="475" rx="298" ry="288" fill="#A81210" opacity="0.09" filter="url(#b26)"/>

  <!-- ═════ Ω ring ═════ -->
  <g mask="url(#ringMask)">
    <use href="#annulus" fill="url(#ringBody)"/>
    <g clip-path="url(#ringClip)">
      <ellipse cx="488" cy="304" rx="126" ry="54" fill="#E42118" opacity="0.75" filter="url(#b14)" transform="rotate(-30 488 304)"/>
      <ellipse cx="765" cy="304" rx="126" ry="54" fill="#E42118" opacity="0.75" filter="url(#b14)" transform="rotate(30 765 304)"/>
      <ellipse cx="626" cy="238" rx="72" ry="26" fill="#3A0000" opacity="0.9" filter="url(#b14)"/>
      <ellipse cx="626.5" cy="470" rx="180" ry="186" stroke="url(#rimLight)" stroke-width="16" filter="url(#b6)"/>
      <ellipse cx="626.5" cy="470" rx="238" ry="226" stroke="#240000" stroke-opacity="0.7" stroke-width="12" filter="url(#b6)"/>
      <ellipse cx="415" cy="595" rx="42" ry="85" fill="#C01310" opacity="0.4" filter="url(#b14)"/>
      <ellipse cx="838" cy="595" rx="42" ry="85" fill="#C01310" opacity="0.4" filter="url(#b14)"/>
    </g>
  </g>

  <!-- ═════ feet ═════ -->
  <g>
    <use href="#footL" fill="url(#footBody)"/>
    <use href="#footL" fill="url(#footBody)" transform="translate(1253,0) scale(-1,1)"/>
    <g filter="url(#b3)">
      <path d="M 395 712 L 583 710" stroke="#FF5A42" stroke-width="8" stroke-linecap="round"/>
      <path d="M 670 710 L 858 712" stroke="#FF5A42" stroke-width="8" stroke-linecap="round"/>
    </g>
    <g filter="url(#b6)">
      <ellipse cx="498" cy="729" rx="118" ry="7" fill="#E01E18" opacity="0.65"/>
      <ellipse cx="755" cy="729" rx="118" ry="7" fill="#E01E18" opacity="0.65"/>
    </g>
    <g filter="url(#b14)">
      <ellipse cx="498" cy="738" rx="150" ry="10" fill="#A01008" opacity="0.45"/>
      <ellipse cx="755" cy="738" rx="150" ry="10" fill="#A01008" opacity="0.45"/>
    </g>
  </g>

  <!-- ═════ EOS crystal (traced) ═════
       T(626.5,322) V1L(553,426) V1R(700,426) V2L(522,575) V2R(731,575)
       B(626.5,650) N(626.5,415) bar y=580 from hull to hull            -->
  <g stroke-linejoin="miter" stroke-linecap="butt" fill="none">
    <!-- glow duplicate -->
    <g stroke="#DC2118" opacity="0.42" filter="url(#b3)" stroke-width="12">
      <path d="M 626.5 322 L 553 426 L 522 575 L 626.5 650 L 731 575 L 700 426 Z"/>
      <path d="M 626.5 322 L 626.5 415 M 626.5 415 L 522 575 M 626.5 415 L 731 575
               M 553 426 L 626.5 650 M 700 426 L 626.5 650 M 541 580 L 712 580"/>
    </g>
    <!-- crisp pass -->
    <g stroke="url(#gem)" stroke-width="12">
      <path d="M 626.5 322 L 553 426 L 522 575 L 626.5 650 L 731 575 L 700 426 Z"/>
      <path d="M 626.5 322 L 626.5 415 M 626.5 415 L 522 575 M 626.5 415 L 731 575
               M 553 426 L 626.5 650 M 700 426 L 626.5 650 M 541 580 L 712 580"/>
    </g>
  </g>
</svg>
