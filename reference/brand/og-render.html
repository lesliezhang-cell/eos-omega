<!doctype html>
<html><head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0}
  .card{width:1200px;height:630px;position:relative;background:#0a0a0c;overflow:hidden;
    font-family:-apple-system,Helvetica,Arial,sans-serif;color:#f4f4f6}
  .glow{position:absolute;inset:0;background:radial-gradient(60% 60% at 82% 15%,rgba(229,50,45,.20),transparent)}
  .grid{position:absolute;inset:0;
    background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
    background-size:90px 90px}
  .lock{position:absolute;top:60px;left:76px;display:flex;align-items:center;gap:16px}
  .lock img{width:76px;height:76px;display:block}
  .wm{line-height:1}
  .wm .n{font-weight:800;font-size:30px;letter-spacing:1px}
  .wm .n .o{color:#ff5a5a}
  .wm .s{font-weight:500;font-size:12px;letter-spacing:7px;color:#79696d;margin-top:6px}
  h1{position:absolute;top:238px;left:74px;margin:0;font-weight:800;font-size:82px;letter-spacing:-2px;line-height:1.06}
  .sub{position:absolute;top:466px;left:78px;margin:0;font-weight:400;font-size:27px;color:#9a9aa3}
  .strip{position:absolute;left:80px;top:548px;display:flex;align-items:center;gap:14px}
  .strip .bar{width:26px;height:2px;background:#e5322d}
  .strip .t{font-weight:500;font-size:16px;letter-spacing:2px;color:#b9abae}
</style></head>
<body>
<div class="card">
  <div class="glow"></div>
  <div class="grid"></div>
  <div class="lock">
    <img src="../../public/brand-mark.png" alt="">
    <div class="wm"><div class="n">EOS <span class="o">OMEGA</span></div><div class="s">ACCELERATION</div></div>
  </div>
  <h1>Build the ultimate<br>ventures on EOS</h1>
  <p class="sub">The official EOS accelerator — capital, engineering &amp; network.</p>
  <div class="strip"><span class="bar"></span><span class="t">OFFICIALLY RECOGNIZED BY THE EOS NETWORK</span></div>
</div>
</body></html>
